<div class="min-h-screen w-full flex items-center justify-center bg-[#020617] relative overflow-hidden">
    
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-indigo-600/10 rounded-full blur-[100px] animate-glow-pulse pointer-events-none"></div>

    <div class="relative z-10 w-full max-w-md">
        
        <div class="text-center mb-10 opacity-0 animate-fade-in-up" style="animation-delay: 0.1s;">
            <div class="w-16 h-16 mx-auto bg-slate-900 border border-indigo-500/30 rounded-2xl flex items-center justify-center shadow-[0_0_30px_rgba(99,102,241,0.2)] mb-6 relative group overflow-hidden">
                <div class="absolute inset-0 bg-indigo-500/10 group-hover:bg-indigo-500/20 transition-colors duration-500"></div>
                <i class="pi pi-shield text-3xl text-indigo-400 group-hover:scale-110 transition-transform duration-500"></i>
            </div>
            <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-white to-slate-400 tracking-tight mb-2">
                System Authorization
            </h1>
            <p class="text-indigo-400/60 font-medium tracking-widest text-xs uppercase">Encrypted Core Access</p>
        </div>

        <div class="bg-slate-900/60 backdrop-blur-xl border border-slate-700/50 p-8 rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
            <form [formGroup]="loginForm" (ngSubmit)="submitCredentials()" class="space-y-6">
                
                <div class="space-y-2 opacity-0 animate-fade-in-up" style="animation-delay: 0.2s;">
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-widest pl-1">Operator ID</label>
                    <div class="relative group">
                        <i class="pi pi-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-indigo-400 group-focus-within:scale-110 transition-all duration-300"></i>
                        <input type="text" formControlName="operatorId" class="w-full bg-slate-950/80 border border-slate-700/80 rounded-xl pl-12 pr-4 py-3.5 text-slate-200 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 focus:shadow-[0_0_15px_rgba(99,102,241,0.3)] transition-all duration-300 placeholder-slate-600 font-mono text-sm" placeholder="admin@enterprise.com">
                    </div>
                </div>

                <div class="space-y-2 opacity-0 animate-fade-in-up" style="animation-delay: 0.3s;">
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-widest pl-1">Clearance Code</label>
                    <div class="relative group">
                        <i class="pi pi-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-indigo-400 group-focus-within:scale-110 transition-all duration-300"></i>
                        <input type="password" formControlName="clearanceCode" class="w-full bg-slate-950/80 border border-slate-700/80 rounded-xl pl-12 pr-4 py-3.5 text-slate-200 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 focus:shadow-[0_0_15px_rgba(99,102,241,0.3)] transition-all duration-300 placeholder-slate-600 font-mono text-sm" placeholder="••••••••••••">
                    </div>
                </div>

                <div class="flex items-center justify-between pt-2 opacity-0 animate-fade-in-up" style="animation-delay: 0.4s;">
                    <label class="flex items-center space-x-2 cursor-pointer group">
                        <div class="w-4 h-4 rounded border border-slate-600 bg-slate-900 group-hover:border-indigo-400 flex items-center justify-center transition-colors">
                            <i class="pi pi-check text-[10px] text-indigo-400 opacity-0 group-hover:opacity-100"></i>
                        </div>
                        <span class="text-sm text-slate-400 font-medium hover:text-slate-300 transition-colors">Keep session active</span>
                    </label>
                    <a href="#" class="text-sm text-indigo-400 hover:text-indigo-300 font-medium transition-colors">Recover Access</a>
                </div>

                <div class="opacity-0 animate-fade-in-up pt-4" style="animation-delay: 0.5s;">
                    <button type="submit" [disabled]="isAuthenticating" 
                            class="relative w-full bg-indigo-500/20 border border-indigo-500/50 hover:bg-indigo-500/40 hover:border-indigo-400 text-indigo-300 hover:text-white font-bold tracking-widest uppercase py-4 rounded-xl shadow-[0_0_20px_rgba(99,102,241,0.15)] hover:shadow-[0_0_30px_rgba(99,102,241,0.3)] transition-all duration-500 group overflow-hidden disabled:opacity-50 disabled:cursor-not-allowed">
                        
                        @if (!isAuthenticating) {
                            <span class="flex items-center justify-center relative z-10 transition-transform duration-300 group-hover:scale-105">
                                <i class="pi pi-fingerprint text-xl mr-2"></i> Initialize Uplink
                            </span>
                        } @else {
                            <span class="flex items-center justify-center relative z-10 text-emerald-400">
                                <i class="pi pi-spinner animate-spin text-xl mr-2"></i> Negotiating Handshake...
                            </span>
                        }
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
