<div class="h-screen w-full flex overflow-hidden bg-[#020617] text-slate-200">

    <p-toast position="top-right" [style]="{marginTop: '80px'}" styleClass="bg-slate-900/90 backdrop-blur-xl border border-slate-700/50 text-slate-200 shadow-[0_10px_40px_rgba(0,0,0,0.5)] rounded-2xl"></p-toast>
 
    @if (!isAuthRoute) {
        <aside class="w-64 h-full bg-slate-900/80 backdrop-blur-md border-r border-slate-800 shadow-2xl flex flex-col transition-all duration-300 z-20">
            <app-sidebar></app-sidebar>
        </aside>
    }

    <div class="flex-1 flex flex-col h-full relative overflow-hidden">
        
        <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-indigo-600/10 rounded-full blur-3xl -z-10 pointer-events-none"></div>
        <div class="absolute bottom-0 left-1/4 w-[400px] h-[400px] bg-blue-600/10 rounded-full blur-3xl -z-10 pointer-events-none"></div>

        @if (!isAuthRoute) {
            <header class="h-20 w-full bg-slate-900/50 backdrop-blur-md border-b border-slate-800 shadow-sm z-10">
                <app-navbar></app-navbar>
            </header>
        }

        <main class="flex-1 overflow-y-auto z-0 scroll-smooth" [class.p-8]="!isAuthRoute">
            <div [class.max-w-7xl]="!isAuthRoute" [class.mx-auto]="!isAuthRoute" class="h-full">
                <router-outlet></router-outlet>
            </div>
        </main>
        
    </div>
</div>
