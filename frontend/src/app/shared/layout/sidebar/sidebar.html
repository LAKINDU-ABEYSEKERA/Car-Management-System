<div class="flex flex-col h-full text-slate-300">
    <div class="h-20 flex items-center px-8 border-b border-slate-800/50 bg-slate-900/30">
        <div class="w-8 h-8 rounded bg-gradient-to-br from-indigo-500 to-blue-600 flex items-center justify-center shadow-lg shadow-indigo-500/20 mr-3">
            <i class="pi pi-car text-white text-sm"></i>
        </div>
        <span class="text-xl font-bold text-white tracking-widest">FLEET<span class="font-light text-indigo-400">OS</span></span>
    </div>

    <nav class="flex-1 py-8 px-4 space-y-2">
        <a routerLink="/dashboard" routerLinkActive="bg-indigo-600/10 text-indigo-400 border-indigo-500" [routerLinkActiveOptions]="{exact: true}" class="flex items-center px-4 py-3 rounded-xl hover:bg-slate-800/50 transition-all duration-300 border-l-4 border-transparent group">
            <i class="pi pi-chart-pie mr-4 text-lg group-hover:scale-110 transition-transform"></i>
            <span class="font-medium tracking-wide">Command Center</span>
        </a>

        <a routerLink="/fleet" routerLinkActive="bg-indigo-600/10 text-indigo-400 border-indigo-500" class="flex items-center px-4 py-3 rounded-xl hover:bg-slate-800/50 transition-all duration-300 border-l-4 border-transparent group">
            <i class="pi pi-list mr-4 text-lg group-hover:scale-110 transition-transform"></i>
            <span class="font-medium tracking-wide">Fleet Ledger</span>
        </a>
    </nav>

    <div class="p-6 border-t border-slate-800/50 bg-slate-900/20">
        <div class="flex items-center space-x-3 text-sm">
            <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
            <span class="text-slate-400 font-medium">System Online</span>
        </div>
    </div>
</div>
