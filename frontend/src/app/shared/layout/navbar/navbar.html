<div class="w-full h-full px-8 flex items-center justify-between opacity-0 animate-fade-in-up" style="animation-delay: 0.1s;">
    
    <div class="flex items-center w-1/3">
        <div class="relative w-full group">
            <i class="pi pi-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-indigo-400 transition-colors"></i>
            <input type="text" 
                   class="w-full bg-slate-950/50 border border-slate-700/50 rounded-full pl-12 pr-4 py-2.5 text-slate-200 text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all shadow-inner placeholder-slate-500" 
                   placeholder="Search fleet, ledgers, or operator IDs... (Press '/')">
            <div class="absolute right-3 top-1/2 -translate-y-1/2 px-2 py-0.5 bg-slate-800 rounded text-xs text-slate-400 font-mono border border-slate-700">/</div>
        </div>
    </div>

    <div class="flex items-center space-x-6">
        
        <div class="hidden md:flex items-center px-3 py-1.5 bg-emerald-500/10 border border-emerald-500/20 rounded-full cursor-help hover:bg-emerald-500/20 transition-colors">
            <div class="relative flex h-2.5 w-2.5 mr-2">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500"></span>
            </div>
            <span class="text-xs font-bold tracking-widest uppercase text-emerald-400">Spring Boot Sync</span>
        </div>

        <button class="relative p-2 text-slate-400 hover:text-white transition-colors group">
            <i class="pi pi-bell text-xl group-hover:animate-[wiggle_1s_ease-in-out_infinite]"></i>
            <div class="absolute top-1.5 right-1.5 w-2.5 h-2.5 bg-rose-500 rounded-full border-2 border-slate-900 shadow-[0_0_10px_rgba(225,29,72,0.8)]"></div>
        </button>

        <div class="h-8 w-px bg-slate-700/50"></div>

        <div class="flex items-center space-x-3 cursor-pointer group hover:bg-slate-800/50 p-1.5 pr-4 rounded-full transition-all border border-transparent hover:border-slate-700/50">
            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 p-[2px] group-hover:shadow-[0_0_15px_rgba(99,102,241,0.4)] transition-shadow">
                <div class="w-full h-full bg-slate-900 rounded-full flex items-center justify-center">
                    <i class="pi pi-user text-indigo-400"></i>
                </div>
            </div>
            
            <div class="flex flex-col">
                <span class="text-sm font-bold text-slate-200 leading-tight group-hover:text-white transition-colors">
                    {{ authService.currentUser()?.sub || 'SYSTEM ADMIN' }}
                </span>
                <span class="text-[10px] uppercase tracking-widest text-indigo-400 font-bold">
                    Level 5 Clearance
                </span>
            </div>
            <i class="pi pi-angle-down text-slate-500 text-sm ml-2 group-hover:translate-y-0.5 transition-transform"></i>
        </div>

    </div>
</div>
